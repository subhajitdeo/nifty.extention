<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
      background: #0a0e17;
      color: #e0e6ed;
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
      background: linear-gradient(135deg, #00d4ff, #7b2ffc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status {
      padding: 10px;
      background: #111b2e;
      border-radius: 8px;
      border: 1px solid #1a2332;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .level {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
      border-bottom: 1px solid #1a2332;
    }
    .level .label {
      color: #6b7a8f;
    }
    .level .value {
      font-weight: bold;
    }
    .level .value.green { color: #00d4aa; }
    .level .value.red { color: #ff4757; }
    .level .value.yellow { color: #ffd700; }
    .level .value.blue { color: #00d4ff; }
    .level .value.purple { color: #a855f7; }
    .refresh-btn {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      background: linear-gradient(135deg, #00d4ff, #7b2ffc);
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .refresh-btn:hover {
      opacity: 0.8;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot.live {
      background: #00d4aa;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-dot.closed {
      background: #ff4757;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <h2>📊 Nifty OI Levels</h2>
  
  <div class="status" id="status">
    <span class="status-dot live" id="statusDot"></span>
    <span id="statusText">Loading...</span>
  </div>
  
  <div id="levels">
    <div class="level">
      <span class="label">CE 2nd Highest OI</span>
      <span class="value yellow" id="ceSecond">-</span>
    </div>
    <div class="level">
      <span class="label">PE 2nd Highest OI</span>
      <span class="value orange" id="peSecond">-</span>
    </div>
    <div class="level">
      <span class="label">CE Highest Volume</span>
      <span class="value blue" id="ceVol">-</span>
    </div>
    <div class="level">
      <span class="label">PE Highest Volume</span>
      <span class="value purple" id="peVol">-</span>
    </div>
    <div class="level" style="border-top: 2px solid #1a2332; padding-top: 8px; margin-top: 4px;">
      <span class="label">Buy Entry</span>
      <span class="value green" id="buyEntry">-</span>
    </div>
    <div class="level">
      <span class="label">Buy SL</span>
      <span class="value red" id="buySL">-</span>
    </div>
    <div class="level">
      <span class="label">Buy Target 1</span>
      <span class="value green" id="buyT1">-</span>
    </div>
    <div class="level">
      <span class="label">Buy Target 2</span>
      <span class="value green" id="buyT2">-</span>
    </div>
    <div class="level" style="border-top: 2px solid #1a2332; padding-top: 8px; margin-top: 4px;">
      <span class="label">Sell Entry</span>
      <span class="value red" id="sellEntry">-</span>
    </div>
    <div class="level">
      <span class="label">Sell SL</span>
      <span class="value red" id="sellSL">-</span>
    </div>
    <div class="level">
      <span class="label">Sell Target 1</span>
      <span class="value red" id="sellT1">-</span>
    </div>
    <div class="level">
      <span class="label">Sell Target 2</span>
      <span class="value red" id="sellT2">-</span>
    </div>
  </div>
  
  <button class="refresh-btn" id="refreshBtn">🔄 Refresh Now</button>
  
  <script src="popup.js"></script>
</body>
</html>

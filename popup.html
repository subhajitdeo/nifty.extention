<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 340px;
      padding: 16px;
      background: #0a0e17;
      color: #e0e6ed;
      font-family: Arial, sans-serif;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #00d4ff;
    }
    .status {
      padding: 10px;
      background: #111b2e;
      border-radius: 6px;
      font-size: 13px;
      border: 1px solid #1a2332;
      margin-bottom: 12px;
      color: #8a9aae;
    }
    .status.success { color: #00d4aa; border-color: #00d4aa; }
    .status.error { color: #ff4757; border-color: #ff4757; }
    .status.loading { color: #ffd700; border-color: #ffd700; }
    
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #00d4ff; color: #000; }
    .btn-success { background: #00d4aa; color: #000; }
    .btn-secondary { background: #1a2332; color: #e0e6ed; border: 1px solid #2a3a52; }
    
    .data-display {
      background: #0d1624;
      border: 1px solid #1a2332;
      border-radius: 4px;
      padding: 10px;
      margin-top: 10px;
      font-family: monospace;
      font-size: 11px;
      color: #8a9aae;
      max-height: 150px;
      overflow: auto;
      display: none;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .data-display.show { display: block; }
    
    .footer {
      font-size: 10px;
      color: #3d4a5f;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2>Nifty OI to PineScript</h2>
  
  <div class="status" id="status">Click button to fetch data</div>
  
  <div class="btn-group">
    <button class="btn btn-primary" id="fetchBtn">Fetch Data</button>
    <button class="btn btn-success" id="copyBtn" disabled>Copy PineScript Code</button>
  </div>
  
  <div class="data-display" id="dataDisplay"></div>
  
  <div class="footer">v2.0 - Data from Supabase</div>
  
  <script src="popup.js"></script>
</body>
</html>
